<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي X & O 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.35);
            --bg: #080e1a;
            --card: #0f1928;
            --card-border: rgba(0, 210, 255, 0.12);
            --host: #a78bfa;
            --host-glow: rgba(167, 139, 250, 0.3);
            --join: #34d399;
            --join-glow: rgba(52, 211, 153, 0.3);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,210,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,210,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .orb1 { width: 400px; height: 400px; background: rgba(0,210,255,0.07); top: -100px; right: -100px; }
        .orb2 { width: 300px; height: 300px; background: rgba(167,139,250,0.07); bottom: -80px; left: -80px; }

        .card {
            position: relative;
            z-index: 1;
            background: var(--card);
            padding: 40px 35px;
            border-radius: 28px;
            width: 92%;
            max-width: 420px;
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes cardIn {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to { transform: none; opacity: 1; }
        }

        .logo-wrap { text-align: center; margin-bottom: 32px; }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,210,255,0.08);
            border: 1px solid rgba(0,210,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 16px;
        }

        .logo-x { color: #ff6b81; font-size: 1.6rem; font-weight: 900; font-family: 'Tajawal', sans-serif; }
        .logo-vs { color: var(--muted); font-size: 0.85rem; font-weight: 700; }
        .logo-o { color: #34d399; font-size: 1.6rem; font-weight: 900; font-family: 'Tajawal', sans-serif; }

        h1 { font-size: 2rem; font-weight: 900; color: white; line-height: 1.2; }
        h1 span { color: var(--primary); }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

        .input-group { position: relative; margin-bottom: 14px; }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 7px;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1.5px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.04);
            color: white;
            text-align: right;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.2s;
        }

        input::placeholder { color: var(--muted); }
        input:focus {
            border-color: var(--primary);
            background: rgba(0,210,255,0.05);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--muted);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.97); }

        .btn-join {
            background: linear-gradient(135deg, #059669, #34d399);
            color: white;
            box-shadow: 0 8px 25px var(--join-glow);
            margin-top: 8px;
        }

        .btn-host {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
            box-shadow: 0 8px 25px var(--host-glow);
        }

        .btn-icon { font-size: 1.2rem; }

        .error-msg {
            color: #f87171;
            font-size: 0.82rem;
            margin-top: 6px;
            display: none;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo-badge">
                <span class="logo-x">X</span>
                <span class="logo-vs">VS</span>
                <span class="logo-o">O</span>
            </div>
            <h1>تحدي <span>X & O</span></h1>
            <div class="subtitle">العب مع صديقك في الوقت الفعلي ⚡</div>
        </div>

        <div class="input-group">
            <label>اسمك في اللعبة</label>
            <input type="text" id="nameInput" placeholder="مثال: أبو تركي" maxlength="20">
            <div class="error-msg" id="nameError">اكتب اسمك أولاً ✋</div>
        </div>

        <button class="btn btn-host" onclick="createGame()">
            <span class="btn-icon">🏰</span>
            إنشاء غرفة جديدة
        </button>

        <div class="divider">أو انضم لغرفة موجودة</div>

        <div class="input-group">
            <label>كود الغرفة (PIN)</label>
            <input type="number" id="pinInput" placeholder="أدخل الـ PIN">
            <div class="error-msg" id="pinError">اكتب كود الغرفة ✋</div>
        </div>

        <button class="btn btn-join" onclick="joinGame()">
            <span class="btn-icon">⚔️</span>
            انضمام للتحدي
        </button>
    </div>

    <script>
        function showError(id, show) {
            document.getElementById(id).style.display = show ? 'block' : 'none';
        }

        function createGame() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) { showError('nameError', true); document.getElementById('nameInput').focus(); return; }
            showError('nameError', false);
            const pin = Math.floor(1000 + Math.random() * 9000);
            window.location.href = `game.html?pin=${pin}&name=${encodeURIComponent(name)}&role=host`;
        }

        function joinGame() {
            const name = document.getElementById('nameInput').value.trim();
            const pin = document.getElementById('pinInput').value.trim();
            let hasError = false;
            if (!name) { showError('nameError', true); hasError = true; }
            else showError('nameError', false);
            if (!pin) { showError('pinError', true); hasError = true; }
            else showError('pinError', false);
            if (hasError) return;
            window.location.href = `game.html?pin=${pin}&name=${encodeURIComponent(name)}`;
        }

        document.getElementById('nameInput').addEventListener('input', () => showError('nameError', false));
        document.getElementById('pinInput').addEventListener('input', () => showError('pinError', false));
    </script>
</body>
</html>
